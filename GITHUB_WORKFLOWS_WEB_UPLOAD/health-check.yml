name: LottoMaster Server V2 Health
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'
permissions:
  contents: read
jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run health
